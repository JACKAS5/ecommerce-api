version: "3.9"

services:
  # E-Commerce API Service
  api:
    build: .
    container_name: ecommerce-api
    ports:
      - "5000:5000"
    env_file:
      - .env.development   # Automatically loads MONGO_URI and other vars
    depends_on:
      - mongo
    volumes:
      - .:/usr/src/app      # For dev: live reload
    command: npm run dev    # Use 'npm start' in production
    restart: unless-stopped

  # MongoDB Service
  mongo:
    image: mongo:6
    container_name: ecommerce-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

# Named volumes
volumes:
  mongo-data: